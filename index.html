<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedReminder - Quản lý & Theo dõi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary: #5b3cff;
            --secondary: #7588ff;
            --success: #22c392;
            --danger: #ff5d7a;
            --bg: #eef2ff;
            --surface: #ffffff;
            --surface-soft: #f6f7ff;
            --text: #232a4a;
            --muted: #6f7b9d;
            --border: rgba(110, 125, 255, 0.14);
            --shadow: 0 30px 80px rgba(50, 63, 128, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, rgba(91, 60, 255, 0.18), transparent 25%),
                        radial-gradient(circle at bottom right, rgba(95, 196, 255, 0.12), transparent 28%),
                        var(--bg);
            color: var(--text);
            padding-bottom: 100px;
        }

        .navbar {
            background: linear-gradient(135deg, var(--primary), #6c77fd);
            border: none;
            box-shadow: 0 24px 60px rgba(49, 67, 160, 0.16);
        }

        .navbar .navbar-brand {
            letter-spacing: 0.02em;
        }

        .navbar .btn {
            border-radius: 999px;
            font-weight: 700;
        }

        .hero-panel {
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(108, 115, 255, 0.12);
            border-radius: 28px;
            padding: 28px 28px 20px;
            box-shadow: 0 28px 70px rgba(49, 67, 160, 0.08);
            margin-bottom: 28px;
        }

        .hero-panel h2 {
            font-size: clamp(2rem, 2.5vw, 2.6rem);
            letter-spacing: -0.04em;
        }

        .hero-panel p {
            color: var(--muted);
            max-width: 680px;
        }

        .hero-stat {
            background: var(--surface-soft);
            border: 1px solid rgba(110, 125, 255, 0.11);
            border-radius: 20px;
            padding: 18px 22px;
            min-width: 150px;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.8);
        }

        .hero-stat h3 {
            font-size: 1.75rem;
            margin-bottom: 0.35rem;
            color: var(--text);
        }

        .hero-stat small {
            color: var(--muted);
        }

        .card-med {
            border: none;
            border-radius: 26px;
            box-shadow: 0 18px 55px rgba(71, 80, 152, 0.09);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            background: linear-gradient(180deg, #ffffff, #f8f9ff);
            position: relative;
            overflow: hidden;
        }

        .card-med::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, rgba(91, 60, 255, 1), rgba(117, 136, 255, 0.8));
        }

        .card-med:hover {
            transform: translateY(-6px);
            box-shadow: 0 24px 70px rgba(71, 80, 152, 0.16);
        }

        .card-med .card-body {
            padding: 24px 24px 20px;
        }

        .is-taken {
            background: #f5f7ff !important;
            opacity: 0.96;
        }

        .is-taken .med-name {
            text-decoration: line-through;
            color: #9aa3bd;
        }

        .filter-section {
            background: rgba(255,255,255,0.95);
            padding: 24px;
            border-radius: 24px;
            border: 1px solid rgba(110, 125, 255, 0.12);
            box-shadow: 0 18px 48px rgba(82, 94, 180, 0.08);
            margin-bottom: 32px;
        }

        .time-badge {
            background: rgba(91, 60, 255, 0.08);
            color: var(--primary);
            padding: 7px 18px;
            border-radius: 999px;
            font-weight: 700;
        }

        .form-control,
        .form-control:focus,
        .form-control:focus-visible {
            border-radius: 999px;
            border: 1px solid rgba(110, 125, 255, 0.2);
            box-shadow: none;
            padding: 0.9rem 1.1rem;
            background: #f9fbff;
        }

        .form-control:focus {
            border-color: rgba(91, 60, 255, 0.35);
        }

        .btn-primary {
            background: var(--primary);
            border-color: transparent;
            box-shadow: 0 15px 30px rgba(91, 60, 255, 0.18);
        }

        .btn-primary:hover {
            background: #4238ff;
        }

        .btn-outline-light {
            color: #ffffff;
            border-color: rgba(255,255,255,0.35);
        }

        .btn-outline-light:hover {
            color: white;
            background: rgba(255,255,255,0.12);
        }

        .fab-add {
            position: fixed;
            bottom: 28px;
            right: 28px;
            width: 64px;
            height: 64px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            box-shadow: 0 22px 45px rgba(91, 60, 255, 0.25);
            border: none;
            z-index: 1000;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .fab-add:hover {
            transform: scale(1.08);
            background: #3829ff;
        }

        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.78);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .schedule-empty {
            min-height: 240px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
        }

        .modal-content {
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid rgba(110, 125, 255, 0.12);
        }

        .modal-body .form-control {
            border-radius: 18px;
            padding: 0.95rem 1.25rem;
            background: #f7f8ff;
        }
    </style>
</head>
<body>
    <div id="loading-overlay" class="d-none">
        <div class="spinner-border text-primary" role="status"></div>
    </div>

    <nav class="navbar navbar-dark sticky-top shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><i class="bi bi-capsule-pill me-2"></i>MedReminder</a>
            <div class="d-flex align-items-center flex-wrap gap-2">
                <span id="userBadge" class="badge bg-white text-primary shadow-sm d-none"></span>
                <button id="logoutBtn" class="btn btn-outline-light btn-sm rounded-pill px-3 d-none">Đăng xuất</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="hero-panel shadow-sm">
            <div class="row align-items-center gy-3">
                <div class="col-lg-8">
                    <h2 class="fw-bold mb-2">Quản lý lịch uống thuốc dễ dàng</h2>
                    <p>Thêm nhắc uống, đánh dấu đã thực hiện và duy trì thói quen chăm sóc sức khỏe mỗi ngày với giao diện gọn gàng, hiện đại.</p>
                </div>
                <div class="col-lg-4 d-flex align-items-center justify-content-lg-end">
                    <div class="hero-stat text-center me-3">
                        <h3 id="statCount">0</h3>
                        <small>Nhắc trong ngày</small>
                    </div>
                    <div class="hero-stat text-center">
                        <h3 id="statComplete">0%</h3>
                        <small>Tỷ lệ hoàn thành</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="filter-section d-flex flex-column flex-sm-row align-items-center justify-content-between gap-3">
            <div>
                <h5 class="fw-bold mb-1">Xem lịch uống thuốc</h5>
                <p class="text-muted small mb-0">Chọn ngày để kiểm tra hoặc thêm lịch mới</p>
            </div>
            <div class="d-flex align-items-center gap-2">
                <label class="fw-bold small mb-0">Ngày:</label>
                <input type="date" id="dateFilter" class="form-control rounded-pill border-primary shadow-sm">
            </div>
        </div>

        <div class="row g-4" id="scheduleContainer"></div>
    </div>

    <button class="fab-add" data-bs-toggle="modal" data-bs-target="#addModal">
        <i class="bi bi-plus-lg"></i>
    </button>

    <div class="modal fade" id="addModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow" style="border-radius: 25px;">
                <div class="modal-body p-4">
                    <h5 class="fw-bold mb-4">Thêm lịch nhắc mới</h5>
                    <div class="mb-3">
                        <label class="small fw-bold mb-1">Tên thuốc</label>
                        <input type="text" id="newMedName" class="form-control rounded-pill border-light bg-light p-3" placeholder="Ví dụ: Paracetamol">
                    </div>
                    <div class="mb-3">
                        <label class="small fw-bold mb-1">Giờ uống</label>
                        <input type="time" id="newMedTime" class="form-control rounded-pill border-light bg-light p-3">
                    </div>
                    <div class="d-grid gap-2 mt-4">
                        <button class="btn btn-primary rounded-pill py-3 fw-bold" id="btnSaveQuick">Lưu lịch nhắc</button>
                        <button class="btn btn-light rounded-pill py-3 text-muted" data-bs-dismiss="modal">Hủy</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const API_URL = "https://6a06dc73c83ba8ad9b3e047a.mockapi.io/schedules";
        const currentUser = requireAuth('login.html');

        $(document).ready(() => {
            if (currentUser) {
                $('#userBadge').text(`Xin chào, ${currentUser.fullName}`).removeClass('d-none');
                $('#logoutBtn').removeClass('d-none').on('click', logout);
            }

            const today = new Date().toISOString().split('T')[0];
            $('#dateFilter').val(today);
            loadSchedules(today);
        });

        $('#dateFilter').change(function() {
            loadSchedules($(this).val());
        });

        async function loadSchedules(selectedDate) {
            $('#loading-overlay').removeClass('d-none');
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                // Sắp xếp theo giờ
                data.sort((a, b) => a.time.localeCompare(b.time));
                
                const filtered = data.filter(item => item.date === selectedDate);
                const completedCount = filtered.filter(item => item.isTaken).length;
                const totalCount = filtered.length;

                $('#statCount').text(totalCount);
                $('#statComplete').text(totalCount === 0 ? '0%' : `${Math.round((completedCount / totalCount) * 100)}%`);

                const container = $('#scheduleContainer').empty();
                if (totalCount === 0) {
                    container.append('<div class="schedule-empty w-100"><p class="mb-0">Không có lịch cho ngày đã chọn.</p></div>');
                }

                filtered.forEach(item => {
                    container.append(`
                        <div class="col-md-6 col-lg-4">
                            <div class="card card-med p-3 ${item.isTaken ? 'is-taken' : ''}">
                                <div class="card-body">
                                    <div class="d-flex justify-content-between mb-3">
                                        <span class="time-badge"><i class="bi bi-alarm me-1"></i>${item.time}</span>
                                        ${item.isTaken ? '<span class="badge bg-success rounded-pill px-3">Đã xong</span>' : '<span class="badge bg-warning text-dark rounded-pill px-3">Chờ uống</span>'}
                                    </div>
                                    <h5 class="med-name fw-bold mb-2">${item.medName}</h5>
                                    <p class="text-muted small mb-4">Ngày nhắc: ${selectedDate}</p>
                                    <button class="btn w-100 rounded-pill fw-bold transition ${item.isTaken ? 'btn-outline-secondary' : 'btn-primary shadow'}" 
                                            onclick="markAsTaken('${item.id}', ${item.isTaken})">
                                        ${item.isTaken ? 'Hoàn tác' : 'Đã uống thuốc'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    `);
                });
            } catch (error) { console.error(error); } 
            finally { $('#loading-overlay').addClass('d-none'); }
        }

        // Chức năng THÊM NHANH (POST)
        $('#btnSaveQuick').click(async function() {
            const medName = $('#newMedName').val();
            const time = $('#newMedTime').val();
            const date = $('#dateFilter').val();

            if(!medName || !time) return alert("Vui lòng nhập đủ thông tin!");

            $('#loading-overlay').removeClass('d-none');
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ medName, time, isTaken: false, date })
            });

            $('#addModal').modal('hide');
            $('#newMedName').val('');
            loadSchedules(date);
        });

        async function markAsTaken(id, currentStatus) {
            await fetch(`${API_URL}/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ isTaken: !currentStatus })
            });
            loadSchedules($('#dateFilter').val());
        }
    </script>
</body>
</html>
