<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedReminder - Quản lý & Theo dõi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --primary: #4318ff; --success: #05cd99; --bg: #f4f7fe; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: #2b3674; padding-bottom: 100px; }
        
        .navbar { background: linear-gradient(135deg, var(--primary) 0%, #707eff 100%); border: none; }
        
        .card-med { 
            border: none; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            transition: all 0.3s ease; background: white;
            border-left: 6px solid var(--primary);
        }
        .card-med:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        
        .is-taken { border-left-color: var(--success) !important; background-color: #f8f9fa !important; opacity: 0.8; }
        .is-taken .med-name { text-decoration: line-through; color: #a3aed0; }
        
        .filter-section {
            background: white; padding: 20px; border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03); margin-bottom: 30px;
        }
        
        .time-badge { background: #e7f1ff; color: var(--primary); padding: 6px 16px; border-radius: 50px; font-weight: 700; }
        
        /* Floating Action Button (Nút thêm nhanh) */
        .fab-add {
            position: fixed; bottom: 30px; right: 30px;
            width: 60px; height: 60px; background: var(--primary);
            color: white; border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            font-size: 24px; box-shadow: 0 10px 20px rgba(67, 24, 255, 0.3);
            border: none; z-index: 1000; transition: 0.3s;
        }
        .fab-add:hover { transform: scale(1.1); background: #3311cc; }

        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    </style>
</head>
<body>
    <div id="loading-overlay" class="d-none">
        <div class="spinner-border text-primary" role="status"></div>
    </div>

    <nav class="navbar navbar-dark sticky-top shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><i class="bi bi-capsule-pill me-2"></i>MedReminder</a>
            <div>
                <a href="index.html" class="btn btn-light btn-sm rounded-pill px-3 fw-bold">Người bệnh</a>
                <a href="admin.html" class="btn btn-outline-light btn-sm rounded-pill px-3">Quản trị</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="filter-section d-flex flex-wrap align-items-center justify-content-between gap-3">
            <div>
                <h5 class="fw-bold mb-1">Xem lịch uống thuốc</h5>
                <p class="text-muted small mb-0">Chọn ngày để kiểm tra hoặc thêm lịch mới</p>
            </div>
            <div class="d-flex align-items-center gap-2">
                <label class="fw-bold small">Ngày:</label>
                <input type="date" id="dateFilter" class="form-control rounded-pill border-primary shadow-sm">
            </div>
        </div>

        <div class="row g-4" id="scheduleContainer">
            </div>
    </div>

    <button class="fab-add" data-bs-toggle="modal" data-bs-target="#addModal">
        <i class="bi bi-plus-lg"></i>
    </button>

    <div class="modal fade" id="addModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow" style="border-radius: 25px;">
                <div class="modal-body p-4">
                    <h5 class="fw-bold mb-4">Thêm lịch nhắc mới</h5>
                    <div class="mb-3">
                        <label class="small fw-bold mb-1">Tên thuốc</label>
                        <input type="text" id="newMedName" class="form-control rounded-pill border-light bg-light p-3" placeholder="Ví dụ: Paracetamol">
                    </div>
                    <div class="mb-3">
                        <label class="small fw-bold mb-1">Giờ uống</label>
                        <input type="time" id="newMedTime" class="form-control rounded-pill border-light bg-light p-3">
                    </div>
                    <div class="d-grid gap-2 mt-4">
                        <button class="btn btn-primary rounded-pill py-3 fw-bold" id="btnSaveQuick">Lưu lịch nhắc</button>
                        <button class="btn btn-light rounded-pill py-3 text-muted" data-bs-dismiss="modal">Hủy</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = "https://69e9c8b415c7e2d51268b733.mockapi.io/v1-demo/schedules";

        $(document).ready(() => {
            const today = new Date().toISOString().split('T')[0];
            $('#dateFilter').val(today);
            loadSchedules(today);
        });

        $('#dateFilter').change(function() {
            loadSchedules($(this).val());
        });

        async function loadSchedules(selectedDate) {
            $('#loading-overlay').removeClass('d-none');
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                // Sắp xếp theo giờ
                data.sort((a, b) => a.time.localeCompare(b.time));
                
                const container = $('#scheduleContainer').empty();
                if(data.length === 0) {
                    container.append('<div class="text-center mt-5"><p>Trống lịch cho ngày này</p></div>');
                }

                data.forEach(item => {
                    container.append(`
                        <div class="col-md-6 col-lg-4">
                            <div class="card card-med p-3 ${item.isTaken ? 'is-taken' : ''}">
                                <div class="card-body">
                                    <div class="d-flex justify-content-between mb-3">
                                        <span class="time-badge"><i class="bi bi-alarm me-1"></i>${item.time}</span>
                                        ${item.isTaken ? '<span class="badge bg-success rounded-pill px-3">Đã xong</span>' : '<span class="badge bg-warning text-dark rounded-pill px-3">Chờ uống</span>'}
                                    </div>
                                    <h5 class="med-name fw-bold mb-2">${item.medName}</h5>
                                    <p class="text-muted small mb-4">Ngày nhắc: ${selectedDate}</p>
                                    <button class="btn w-100 rounded-pill fw-bold transition ${item.isTaken ? 'btn-outline-secondary' : 'btn-primary shadow'}" 
                                            onclick="markAsTaken('${item.id}', ${item.isTaken})">
                                        ${item.isTaken ? 'Hoàn tác' : 'Đã uống thuốc'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    `);
                });
            } catch (error) { console.error(error); } 
            finally { $('#loading-overlay').addClass('d-none'); }
        }

        // Chức năng THÊM NHANH (POST)
        $('#btnSaveQuick').click(async function() {
            const medName = $('#newMedName').val();
            const time = $('#newMedTime').val();
            const date = $('#dateFilter').val();

            if(!medName || !time) return alert("Vui lòng nhập đủ thông tin!");

            $('#loading-overlay').removeClass('d-none');
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ medName, time, isTaken: false, date })
            });

            $('#addModal').modal('hide');
            $('#newMedName').val('');
            loadSchedules(date);
        });

        async function markAsTaken(id, currentStatus) {
            await fetch(`${API_URL}/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ isTaken: !currentStatus })
            });
            loadSchedules($('#dateFilter').val());
        }
    </script>
</body>
</html>
